# run as this user
daemon on;

# let nginx use all available CPU cores (autodetect)
worker_processes 1;

# keep file with PID number at this location
pid /app/config/nginx.pid;

events {
    worker_connections 768;
}

http {
    log_format main
        '[nginx] $remote_addr - $remote_user [$time_local] "$host" "$request"'
        ' $status $body_bytes_sent "$http_referer"'
        ' "$http_user_agent" "$http_x_forwarded_for" "$request_time"'
        ' "$upstream_cache_status" "$sent_http_content_encoding" ';

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Connection: keep-alive header
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # octet, txt, csv, etc. formats
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    access_log /dev/stdout main;
    error_log /dev/stdout;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";

    # nginx <- uWSGI -> Django communication
    upstream django {
        server unix:///app/config/aggregator.sock;
    }

    server {
        listen 8000;
        server_name 
            local.att.com www.local.att.com
            selfservice.dev.att.com www.selfservice.dev.att.com
            selfservice.web.att.com www.selfservice.web.att.com
            selfservice.it.att.com www.selfservice.it.att.com;
        charset utf-8;
        client_max_body_size 25M;

        location /nginx_status {
            stub_status on;
        }

        location /static/ {
            alias /app/aggregator/static/;
        }

        location / {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass django;
            uwsgi_read_timeout 300s;

            uwsgi_param Host $http_host;
            uwsgi_param X-Real-IP $remote_addr;
            uwsgi_param X-Forwarded-Host $server_name;
            uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
            uwsgi_param X-Forwarded-Proto $scheme;

            uwsgi_param Authorization $http_authorization;
        }
    }
}
