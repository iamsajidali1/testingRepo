<p-card styleClass="p-3 p-card-shadow step-router-outlet-card">
  <div class="step-header mt-0 mb-4 underline">{{ title }}</div>

  <!--  TO SHOW THE TOASTS -->
  <p-toast></p-toast>

  <!--  SUMMARY PANEL STARTS HERE   -->
  <section class="summary-wrapper">
    <div class="row" *ngFor="let row of summary">
      <label class="col-md-2 col-sm-12">
        {{ row.label }}
      </label>
      <!--  TEXT TYPE   -->
      <ng-container *ngIf="row.type === 'text'">
        <p class="col-md-10 col-sm-12">
          {{ row.value || 'Not Available' }}
        </p>
      </ng-container>

      <!--  CODE/CONFIG TYPE   -->
      <ng-container *ngIf="row.type === 'config'">
        <div class="col-md-10 col-sm-12">
          <textarea
            pInputTextarea
            [rows]="configRows"
            class="w-full"
            [value]="row.value"
            readonly
          ></textarea>
        </div>
      </ng-container>

      <!--  STATUS TYPE   -->
      <ng-container *ngIf="row.type === 'status'">
        <p class="col-md-10 col-sm-12 status-message">
          <span
            [ngClass]="{
              'status-passed': row.value.type === 'success',
              'status-failed': row.value.type === 'danger',
              'status-warning': row.value.type === 'warning'
            }"
            class="{{ row.value.icon }} mr-1"
          ></span>
          {{ statusMessage || row.value.message }}
        </p>
      </ng-container>

      <!--  VALIDATION DIFF TYPE   -->
      <ng-container
        *ngIf="row.type === 'validation-diff' && row.value && row.value.length"
      >
        <div class="col-md-10 col-sm-12">
          <div
            *ngFor="let diffValidation of row.value; let index = index"
            class="mt-3"
          >
            <p-fieldset
              class="fieldset-diff"
              legend="{{ diffValidation.command }}"
              [toggleable]="true"
            >
              <div class="config-diff-wrapper">
                <td-ngx-text-diff
                  [left]="diffValidation.preValOutput"
                  [right]="diffValidation.postValOutput"
                  [showToolbar]="true"
                  [format]="'LineByLine'"
                  [hideMatchingLines]="hideMatchingLines"
                  [outerContainerClass]="'compare-container-inline'"
                ></td-ngx-text-diff>
              </div>
            </p-fieldset>
          </div>
        </div>
      </ng-container>
    </div>
  </section>
  <!--  SUMMARY PANEL ENDS HERE   -->

  <!--  FOOTER ACTIONS STARTS HERE  -->
  <ng-template pTemplate="footer">
    <div class="pb-2 pt-1">
      <button
        pButton
        icon="pi pi-home"
        label="Home"
        class="p-button-rounded"
        routerLink="/"
      ></button>
    </div>
  </ng-template>
  <!--  FOOTER ACTIONS ENDS HERE  -->
</p-card>
