<p-card styleClass="p-3 p-card-shadow step-router-outlet-card">
    <div id="networkInsight">
        <div class="step-header mt-0 mb-4 underline">{{ title }}</div>

        <div class="filter-container mb-4">
            <div class="row">
                <div class="col p-4 text-center title w-100">
                    <p class="filter-title">
                        Network Link and Edge Statistics Report: CPU and Memory Utilization, Tunnel Count, and Data
                        Transfer Metrics
                    </p>
                </div>
            </div>
        </div>


        <div class="mb-3">
            <div class="row d-flex align-items-center justify-content-between">
                <div class="col-auto">
                    <p-dropdown
                        [options]="[{ label: 'Link Stats', value: 'link' }, { label: 'Edge Stats', value: 'edge' }]"
                        [(ngModel)]="statsType" optionLabel="label" optionValue="value" inputId="statsTypeSelect"
                        styleClass="w-15rem" (onChange)="onStatsTypeChange($event.value)"></p-dropdown>
                </div>
                <div class="col-auto ml-auto">
                    <p-dropdown [options]="timespanOptions" [(ngModel)]="selectedTimeSpanKey" optionLabel="label"
                        optionValue="value" inputId="timespanSelect" styleClass="w-15rem"
                        (onChange)="onTimespanChange()"></p-dropdown>
                </div>
            </div>
        </div>
        <!-- Pie charts moved below table for minimal layout -->

           <div class="summary-table-container"
               [ngClass]="{'edge-mode': statsType === 'edge', 'link-mode': statsType === 'link'}"
               id="summaryTable" style="overflow-x: auto;">
            <div class="summary-map-container mb-3" *ngIf="statsType === 'edge' && pushPins.length">
                <app-bingmap [pushPins]="pushPins"></app-bingmap>
            </div>
            <p-table [value]="sortedStats" [scrollable]="true" scrollHeight="700px"
                scrollDirection="both" [responsiveLayout]="'scroll'" styleClass="p-table-scrollable minimal-table">
                <ng-template pTemplate="header">
                    <tr>
                        <th *ngFor="let col of displayedColumns; let i = index"
                            scope="col"
                            (click)="onSort(col)"
                            (keydown.enter)="onSort(col)"
                            tabindex="0"
                            [style.width]="i === 1 ? (statsType === 'link' ? '246px' : '124px') : null"
                            [style.minWidth]="i === 1 ? (statsType === 'link' ? '200px' : '92px') : null"
                            [style.maxWidth]="i === 1 ? (statsType === 'link' ? '308px' : '140px') : null">
                            {{ col }}
                            <span *ngIf="sortColumn === col">
                                <i class="pi" [ngClass]="{'pi-sort-alpha-down': sortDirection === 'asc', 'pi-sort-alpha-up': sortDirection === 'desc'}"></i>
                            </span>
                        </th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-stat let-rowIndex="rowIndex">
                    <tr class="hoverable-row" tabindex="0" style="cursor:pointer;">
                        <td *ngFor="let col of displayedColumns; let i = index"
                            [pTooltip]="stat[col]" tooltipPosition="top"
                            [style.width]="i === 1 ? (statsType === 'link' ? '246px' : '124px') : null"
                            [style.minWidth]="i === 1 ? (statsType === 'link' ? '200px' : '92px') : null"
                            [style.maxWidth]="i === 1 ? (statsType === 'link' ? '308px' : '140px') : null"
                            [ngClass]="[getStatClass(col, stat[col]), col === 'HA' ? 'stat-ha' : '']"
                            style="overflow: hidden; text-overflow: ellipsis; white-space: normal; vertical-align: middle; border-bottom: 1px solid #f3f3f3; background: #fff;"
                            (click)="onRowClick(statsType === 'link' ? linkStats[rowIndex] : edgeStats[rowIndex], col, rowIndex)">
                                {{ stat[col]?.length > 30 ? (stat[col] | slice:0:30) + '...' : stat[col] }}
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td [attr.colspan]="displayedColumns.length">No Data Found.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>

    </div>

    <app-chart-modal [visible]="chartModalVisible" [chartData]="chartModalData" [title]="chartModalTitle"
        [displayedColumns]="displayedColumns" [columnMap]="statsType === 'link' ? linkStatsColumnMap : edgeStatsColumnMap"
        chartType="line" (closed)="chartModalVisible = false"></app-chart-modal>

    <ng-template pTemplate="footer">
        <div class="pb-2 pt-1 d-flex">
            <button pButton icon="pi pi-chevron-left" label="Back" class="p-button-rounded p-button-outlined mr-2"
                (click)="onBack()"></button>
            <button pButton icon="pi pi-home" label="Home" class="p-button-rounded" routerLink="/"></button>

            
        </div>
    </ng-template>
    <!--  FOOTER ACTIONS ENDS HERE  -->
</p-card>
