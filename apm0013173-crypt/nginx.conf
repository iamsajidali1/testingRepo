# run as this user
daemon on;

# let nginx use all available CPU cores (autodetect)
worker_processes 1;

# keep file with PID number at this location
pid /app/config/nginx.pid;

events {
    worker_connections 768;
}

http {
    log_format main
        '[nginx] $remote_addr - $remote_user [$time_local] "$host" "$request"'
        ' $status $body_bytes_sent "$http_referer"'
        ' "$http_user_agent" "$http_x_forwarded_for" "$request_time"'
        ' "$upstream_cache_status" "$sent_http_content_encoding" ';

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Connection: keep-alive header
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # octet, txt, csv, etc. formats
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    access_log /dev/stdout main;
    error_log /dev/stdout;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";

    # nginx <- uWSGI -> Django communication
    upstream django {
        server unix:///app/config/crypt.sock;
    }

    server {
        listen 8000;
        server_name
            localhost
            local.att.com
            crypt.dev.att.com www.crypt.dev.att.com
            crypt.test.att.com www.crypt.test.att.com
            crypt.web.att.com www.crypt.web.att.com;
        charset utf-8;

        # catch static first
        location /static/ {
            root /app;
        }


        location / {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass django;
            uwsgi_read_timeout 300s;

            uwsgi_param QUERY_STRING $query_string;
            uwsgi_param REQUEST_METHOD $request_method;
            uwsgi_param CONTENT_TYPE $content_type;
            uwsgi_param CONTENT_LENGTH $content_length;
            uwsgi_param REQUEST_URI $request_uri;
            uwsgi_param PATH_INFO $document_uri;
            uwsgi_param DOCUMENT_ROOT $document_root;
            uwsgi_param SERVER_PROTOCOL $server_protocol;
            uwsgi_param HTTPS $https if_not_empty;
            uwsgi_param REMOTE_ADDR $remote_addr;
            uwsgi_param REMOTE_PORT $remote_port;
            uwsgi_param SERVER_PORT $server_port;
            uwsgi_param SERVER_NAME $server_name;

            uwsgi_param Host $http_host;
            uwsgi_param X-Real-IP $remote_addr;
            uwsgi_param X-Forwarded-Host $server_name;
            uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
            # uwsgi_param X-Forwarded-Proto $scheme;
        }
    }
}
