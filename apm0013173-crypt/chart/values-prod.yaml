# Production Environment values for crypt.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

serviceName: crypt
namespace: com-att-one
replicaCount: 1
keyVaultName: eastus2-one-prodkv

image:
  repository: oneeastus2cr2azn0hvf.azurecr.io/crypt
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "prod-latest"
  containerPort: 8000
  env:
    - name: DJANGO_SECRET
      value: "crypt-django-secret@azurekeyvault"
    - name: DB_NAME
      value: "crypt-mysql-database@azurekeyvault"
    - name: DB_USER
      value: "crypt-mysql-user@azurekeyvault"
    - name: DB_PASSWORD
      value: "crypt-mysql-password@azurekeyvault"
    - name: DB_HOST
      value: "crypt-mysql-host@azurekeyvault"
    - name: DB_PORT
      value: "crypt-mysql-port@azurekeyvault"

    - name: https_proxy
      value: "http://proxy.conexus.svc.local:3128"
    - name: http_proxy
      value: "http://proxy.conexus.svc.local:3128"
    - name: no_proxy
      value: ".extensions.svc,.vault.azure.net,localhost,127.0.0.1,10.0.16.0/24,.svc.cluster.local,.azurecr.io,.azure.com"

ingress:
  enabled: true
  className: ""
  annotations:
    linkerd.io/inject: enabled
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header l5d-dst-override $service_name.$namespace.svc.cluster.local:$service_port;
  hosts:
    - host: crypt.web.att.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: crypt-web-tls-certificate
      hosts:
        - crypt.web.att.com

volumeMounts:
  - mountPath: /app/static/
    name: crypt-config
  - mountPath: /app/config/
    name: crypt-config
  - mountPath: /var/lib/nginx/logs/
    name: nginx-config
  - mountPath: /var/lib/nginx/tmp/
    name: nginx-config

volumes:
  - name: crypt-config
    emptyDir: {}
  - name: nginx-config
    emptyDir: {}
    
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 75