# Development Environment values for one-controller.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
namespace: com-att-one
keyVaultName: eastus2-one-nprdkv

serviceAccount: default
restartPolicy: Always

# Global Ingress Setup
ingress:
  enabled: true
  className: ""
  annotations:
    linkerd.io/inject: enabled
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header l5d-dst-override $service_name.$namespace.svc.cluster.local:$service_port;

modules:
  camunda:
    install: true
    serviceLabels:
      module: "main"
    replicaCount: 1
    podAnnotations:
      linkerd.io/inject: enabled
      config.linkerd.io/proxy-cpu-limit: 2000m
      config.linkerd.io/proxy-memory-limit: 2Gi
      config.linkerd.io/proxy-cpu-request: 1000m
      config.linkerd.io/proxy-memory-request: 1Gi
      config.linkerd.io/skip-outbound-ports: "443,3128,3306"
    image:
      repository: camunda/camunda-bpm-platform
      pullPolicy: IfNotPresent
      tag: "7.21.0-SNAPSHOT"
      containerPort: 8080
    env:
      - name: AAF_USERNAME
        value: "one-aaf-username@azurekeyvault"
      - name: AAF_PASSWORD
        value: "one-aaf-password@azurekeyvault"
      - name: DB_DRIVER
        value: "com.mysql.cj.jdbc.Driver"
      - name: DB_USERNAME
        value: "one-camunda-db-user@azurekeyvault"
      - name: DB_PASSWORD
        value: "one-camunda-db-password@azurekeyvault"
      - name: DB_URL
        value: "one-camunda-db-url@azurekeyvault"
      - name: CRYPT_API_TOKEN
        value: "one-camunda-crypt-token@azurekeyvault"
      - name: CAMUNDA_RA_PASS
        value: "camunda-ra-pass@azurekeyvault"
      - name: DB_VALIDATE_ON_BORROW
        value: 'true'
      - name: https_proxy
        value: "http://proxy.conexus.svc.local:3128"
      - name: http_proxy
        value: "http://proxy.conexus.svc.local:3128"
      - name: no_proxy
        value: ".extensions.svc,.vault.azure.net,localhost,127.0.0.1,10.0.16.0/24,.svc.cluster.local,.azurecr.io,.azure.com"
      - name: CRYPT_URL
        value: "http://crypt-nprd.com-att-one.svc.cluster.local:8000"
      - name: RA_VELOCLOUD_URL
        value: "http://css-ra-velocloud-nprd.com-att-one.svc.cluster.local:8000/api"
      - name: RA_VMANAGE_URL
        value: "http://css-ra-vmanage-nprd.com-att-one.svc.cluster.local:8000/api"
      - name: RA_UTILITIES_URL
        value: "http://css-ra-utilities-nprd.com-att-one.svc.cluster.local:8000/api"
    service:
      name: camunda-http
      type: ClusterIP
      protocol: TCP
      port: 8000
    probes:
      livenessProbe:
        initialDelaySeconds: 180
        timeoutSeconds: 30
        httpGet:
          path: /camunda/app/cockpit/favicon.ico
          port: camunda-http
      readinessProbe:
        initialDelaySeconds: 180
        timeoutSeconds: 30
        httpGet:
          path: /camunda/app/cockpit/favicon.ico
          port: camunda-http
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 750Mi
    securityContext:
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
    volumeMounts:
      # disable demo application
      - mountPath: /camunda/webapps/camunda-invoice
        name: empty-volume
      # enable Basic Auth in Camunda
      - mountPath: /camunda/webapps/engine-rest/WEB-INF/web.xml
        name: engine-rest-conf
        subPath: web.xml
        readOnly: false
    volumes:
      - name: empty-volume
        emptyDir: {}
      - name: engine-rest-conf
        configMap:
          name: engine-rest-conf
          items:
            - key: web.xml
              path: web.xml
    engineRestConf: |-

      <web-app version="3.0" xmlns="http://java.sun.com/xml/ns/javaee"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://java.sun.com/xml/ns/javaee    http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd">

        <!--
        Fetch And Lock Handler (long polling): Unique Worker Request
        (default value: false)
        -->
        <!--
        <context-param>
          <param-name>fetch-and-lock-unique-worker-request</param-name>
          <param-value>true</param-value>
        </context-param>
        -->

        <!-- rest bootstrap listener -->
        <listener>
          <listener-class>org.camunda.bpm.engine.rest.impl.web.bootstrap.RestContainerBootstrap</listener-class>
        </listener>

        <listener>
          <listener-class>org.camunda.bpm.engine.rest.impl.FetchAndLockContextListener</listener-class>
        </listener>

        <filter>
          <filter-name>EmptyBodyFilter</filter-name>
          <filter-class>org.camunda.bpm.engine.rest.filter.EmptyBodyFilter</filter-class>
          <async-supported>true</async-supported>
        </filter>
        <filter-mapping>
          <filter-name>EmptyBodyFilter</filter-name>
          <url-pattern>/*</url-pattern>
        </filter-mapping>

        <filter>
          <filter-name>CacheControlFilter</filter-name>
          <filter-class>org.camunda.bpm.engine.rest.filter.CacheControlFilter</filter-class>
          <async-supported>true</async-supported>
        </filter>
        <filter-mapping>
          <filter-name>CacheControlFilter</filter-name>
          <url-pattern>/*</url-pattern>
        </filter-mapping>

        <!-- Http Basic Authentication Filter -->
        <filter>
          <filter-name>camunda-auth</filter-name>
          <filter-class>
            org.camunda.bpm.engine.rest.security.auth.ProcessEngineAuthenticationFilter
          </filter-class>
        <async-supported>true</async-supported>
          <init-param>
            <param-name>authentication-provider</param-name>
            <param-value>org.camunda.bpm.engine.rest.security.auth.impl.HttpBasicAuthenticationProvider</param-value>
          </init-param>
          <init-param>
            <param-name>rest-url-pattern-prefix</param-name>
            <param-value></param-value>
          </init-param>
        </filter>

        <filter-mapping>
          <filter-name>camunda-auth</filter-name>
          <url-pattern>/*</url-pattern>
        </filter-mapping>
        <!-- End Http Basic Authentication Filter -->

        <servlet>
          <servlet-name>Resteasy</servlet-name>
          <servlet-class>org.jboss.resteasy.plugins.server.servlet.HttpServlet30Dispatcher</servlet-class>
          <init-param>
            <param-name>javax.ws.rs.Application</param-name>
            <param-value>org.camunda.bpm.engine.rest.impl.application.DefaultApplication</param-value>
          </init-param>
          <async-supported>true</async-supported>
        </servlet>

        <servlet-mapping>
          <servlet-name>Resteasy</servlet-name>
          <url-pattern>/*</url-pattern>
        </servlet-mapping>

      </web-app>

  docs:
    install: true
    serviceLabels:
      module: "docs"
    replicaCount: 1
    podAnnotations:
      linkerd.io/inject: enabled
      config.linkerd.io/proxy-cpu-limit: 250m
      config.linkerd.io/proxy-memory-limit: 256Mi
      config.linkerd.io/proxy-cpu-request: 100m
      config.linkerd.io/proxy-memory-request: 128Mi
    image:
      repository: oneeastus2cr2azn0hvf.azurecr.io/one-controller-docs
      pullPolicy: Always
      tag: "latest"
      containerPort: 8000
    service:
      name: docs-http
      type: ClusterIP
      protocol: TCP
      port: 8000
    probes:
      livenessProbe:
        initialDelaySeconds: 30
        timeoutSeconds: 10
        httpGet:
          path: /
      readinessProbe:
        initialDelaySeconds: 30
        timeoutSeconds: 10
        httpGet:
          path: /
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
    volumeMounts:
      - mountPath: /etc/nginx/nginx.conf
        name: docs-nginx-conf
        subPath: nginx.conf
        readOnly: false
      - mountPath: /var/cache/nginx/
        name: docs-volume
      - mountPath: /var/run/
        name: docs-volume
    volumes:
      - name: docs-nginx-conf
        configMap:
          name: docs-nginx-conf
          items:
            - key: nginx.conf
              path: nginx.conf
      - name: docs-volume
        emptyDir: {}
    nginxConf: |-
      user root;
      worker_processes 1;
      error_log /var/log/nginx/error.log warn;
      pid       /var/run/nginx.pid;
      events {
          worker_connections  1024;
      }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';
          access_log  /var/log/nginx/access.log  main;
          sendfile on;
          keepalive_timeout 65;
          gzip on;
          server {
              listen       8000;
              server_name  localhost;
              location / {
                  root   /usr/share/nginx/html;
                  index  index.html index.htm;
              }
              error_page   500 502 503 504  /50x.html;
              location = /50x.html {
                  root   /usr/share/nginx/html;
              }
          }
      }

