      - mountPath: /var/run/
        name: proxy-volume
    volumes:
      - name: nginx-conf
        configMap:
          name: nginx-conf
          items:
            - key: nginx.conf
              path: nginx.conf
      - name: proxy-volume
        emptyDir: {}
    nginxConf: |-
      user root;
      worker_processes 1;
      events {
          worker_connections 10240;
      }

      http {
          log_format upstream_time  '$remote_addr - $remote_user [$time_local] '
                                    '"$request" $status $body_bytes_sent '
                                    '"$http_referer" "$http_host" "$http_user_agent" '
                                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

          upstream carche {
              server carche-nprd.com-att-one.svc.cluster.local:8000;
          }
          upstream docs {
              server one-controller-nprd-docs.com-att-one.svc.cluster.local:8000;
          }
          upstream crypt {
              server crypt-nprd.com-att-one.svc.cluster.local:8000;
          }
          upstream paperplane {
              server paperplane-nprd.com-att-one.svc.cluster.local:8000;
          }

          server {
              access_log /var/log/nginx/access.log upstream_time;
              listen 9999;
              # catch all hosts for now
              server_name
                  localhost local.att.com
                  selfservice.dev.att.com
                  selfservice.test.att.com
                  selfservice.web.att.com
                  fbcaz.web.att.com
                  expressportal.att.com;

              location /svc/crypt {
                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
                  rewrite ^([^.]*[^/])$ $scheme://$http_host$1/ permanent;
              }
              location ~ ^/svc/crypt/(.*) {
                  proxy_pass http://crypt/$1;
                  # manually override header to match ALLOWED_HOSTS
                  proxy_set_header Host crypt.web.att.com;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location /svc/carche {
                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
                  rewrite ^([^.]*[^/])$ $scheme://$http_host$1/ permanent;
              }
              location ~ ^/svc/carche/(.*) {
                  proxy_pass http://carche/$1;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location /docs {
                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
                  rewrite ^([^.]*[^/])$ $scheme://$http_host$1/ permanent;
              }
              location ~ /docs/(.*) {
                  proxy_pass http://docs/$1;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location /svc/paperplane {
                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
                  rewrite ^([^.]*[^/])$ $scheme://$http_host$1/ permanent;
              }
              location ~ ^/svc/paperplane/(.*) {
                  proxy_pass http://paperplane/$1;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location /api {
                  proxy_pass http://one-controller-nprd-express.com-att-one.svc.cluster.local:8000;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location /camunda {
                  proxy_pass http://one-controller-nprd-camunda.com-att-one.svc.cluster.local:8000;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location /engine-rest {
                  proxy_pass http://one-controller-nprd-camunda.com-att-one.svc.cluster.local:8000;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }
              }

              location ~ ^/onetouch/(.*) {
                  proxy_pass http://onetouch-frontend-nprd.com-att-one.svc.cluster.local:8000/$1;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }

                  set $should_check_gl "1";
                  if ($cookie_access_token) {
                      set $should_check_gl "";
                  }

              }

              location /onetouch {
                  proxy_pass http://onetouch-frontend-nprd.com-att-one.svc.cluster.local:8000;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }

                  set $should_check_gl "1";
                  if ($cookie_access_token) {
                      set $should_check_gl "";
                  }
              }

              location ~ ^/one/(.*) {
                  proxy_pass http://one-creator-nprd.com-att-one.svc.cluster.local:8000/$1;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }

                  set $should_check_gl "1";
                  if ($cookie_access_token) {
                      set $should_check_gl "";
                  }

              }
              
              location /one {
                  proxy_pass http://one-creator-nprd.com-att-one.svc.cluster.local:8000;
                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                  if ($host = "expressportal.att.com") {
                      return 406;
                  }

                  set $should_check_gl "1";
                  if ($cookie_access_token) {
                      set $should_check_gl "";
                  }

              }

              location / {
                  # original tunnel to FE
                  proxy_pass http://css-frontend-nprd.com-att-one.svc.cluster.local:8000;

                  set $should_check_bc "";
                  set $should_check_gl "1";

                  # override FE tunnel if sessionID is specified from BC
                  # - GD&A sessionID first pass to BE
                  # - then without ?sessionID= and with Set-Cookie to FE
                  # - GD&A sets X-Gda-To-Css-Session header
                  if ($http_x_gda_to_css_session) {
                      set $should_check_bc "1";
                      set $should_check_gl "";
                  }

                  # cookie from Express.js
                  if ($cookie_bcSession) {
                      set $should_check_bc "";
                      # X-Gda-To-Css-Session is set only
                      # when the cookie is missing
                      set $should_check_gl "";
                  }

                  # cookie from Global Logon
                  if ($cookie_access_token) {
                      set $should_check_gl "";
                  }

                  if ($should_check_bc) {
                      proxy_pass http://one-controller-nprd-express.com-att-one.svc.cluster.local:8000;
                  }

                  proxy_set_header Host $http_host;
                  proxy_set_header X-Forwarded-Host $http_host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Gda-To-Css-Session $http_x_gda_to_css_session;
              }
          }
      }

  workerJs:
    install: true
    replicaCount: 1
    podAnnotations:
      linkerd.io/inject: enabled
      config.linkerd.io/proxy-cpu-limit: 250m
      config.linkerd.io/proxy-memory-limit: 256Mi
      config.linkerd.io/proxy-cpu-request: 100m
      config.linkerd.io/proxy-memory-request: 128Mi
      config.linkerd.io/skip-outbound-ports: "443,3128,7000,8000"
    image:
      repository: oneeastus2cr2azn0hvf.azurecr.io/one-controller
      pullPolicy: Always
      tag: "latest"
      containerPort: 8000
      command:
        - node
      args:
        - main.js
    env:
      - name: AAF_USERNAME
        value: "one-aaf-username@azurekeyvault"
      - name: AAF_PASSWORD
        value: "one-aaf-password@azurekeyvault"
      - name: CAMUNDA_CSS_BACKEND_BASIC
        value: "one-camunda-basicauth@azurekeyvault"
      - name: PAPERPLANE_URL
        value: "one-paperplane-url@azurekeyvault"
      - name: PAPERPLANE_TOKEN
        value: "one-paperplane-token@azurekeyvault"
      - name: MDS_URL
        value: "one-mds-url@azurekeyvault"
      - name: MDS_TOKEN
        value: "one-mds-token@azurekeyvault"
      - name: VCO_URL
        value: "one-vco-url@azurekeyvault"
      - name: VCO_VELOWRAPTOR
        value: "one-vco-velowraptor@azurekeyvault"
      - name: VCO_VERSION
        value: "one-vco-version@azurekeyvault"
      - name: VCO_USERS
        value: "one-vco-users@azurekeyvault"
      - name: VCO_EDGES
        value: "one-vco-edges@azurekeyvault"

      - name: https_proxy
        value: "http://proxy.conexus.svc.local:3128"
      - name: http_proxy
        value: "http://proxy.conexus.svc.local:3128"
      - name: no_proxy
        value: ".extensions.svc,.vault.azure.net,localhost,127.0.0.1,10.0.16.0/24,.svc.cluster.local,.azurecr.io,.azure.com"

      - name: CAMUNDA_ENGINE_URL
        value: "http://one-controller-nprd-camunda.com-att-one.svc.cluster.local:8000/engine-rest/"
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80

cronjobs:
  enabled: true
  resources:
