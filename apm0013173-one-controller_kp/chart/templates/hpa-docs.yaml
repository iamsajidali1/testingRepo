{{- if .Values.modules.docs.install -}}
{{- if .Values.modules.docs.autoscaling.enabled }}
{{ $module := .Values.modules.docs }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "one-controller.fullname" . }}-docs
  labels:
    {{- include "one-controller.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "one-controller.fullname" . }}-docs
  minReplicas: {{ $module.autoscaling.minReplicas }}
  maxReplicas: {{ $module.autoscaling.maxReplicas }}
  metrics:
    {{- if $module.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $module.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $module.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $module.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
