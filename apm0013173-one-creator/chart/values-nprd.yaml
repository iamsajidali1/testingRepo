# Development Environment values for one-creator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

serviceName: one-creator
namespace: com-att-one
replicaCount: 1

image:
  repository: oneeastus2cr2azn0hvf.azurecr.io/one-creator
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "dev-latest"
  containerPort: 8000

ingress:
  enabled: false
  className: ""
  annotations:
    linkerd.io/inject: enabled
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header l5d-dst-override $service_name.$namespace.svc.cluster.local:$service_port;
  hosts:
    - host: selfservice.dev.att.com
      paths:
        - path: /one(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: selfservice-dev-tls-certificate
      hosts:
        - selfservice.dev.att.com

volumeMounts:
  - mountPath: /var/cache/nginx/
    name: nginx-volume
  - mountPath: /var/run/
    name: nginx-volume

volumes:
  - name: nginx-volume
    emptyDir: {}

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
