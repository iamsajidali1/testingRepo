<div class="ui-grid ui-grid-responsive ui-grid-pad ui-fluid">
  <div class="ui-grid-row">
      <div class="ui-grid-col-4" [formGroup]="formToCheck">
        <p-dropdown (onChange)="valueCheck($event.value['value'], row)" [options]="options" [formControl]="formToCheck.controls[(row == undefined) ? 'validator' : row.validator]" placeholder="Validation" optionLabel="name" required></p-dropdown>
      </div>
      <div *ngIf ="regex" class="ui-grid-col-4" [formGroup]="formToCheck">
        <div class="ui-grid-col-12" [formGroup]="formToCheck">
            <input pInputText type="text" [formControl]="formToCheck.controls[(controlType == 'list' || controlType == 'listEdit') ? row.validatorRegExp : 'validatorRegExp']" placeholder="RegEXP" required/>
        </div>
      </div>
      <div *ngIf ="regex" class="ui-grid-col-4" [formGroup]="formToCheck">
        <div class="ui-grid-col-12" [formGroup]="formToCheck">
            <input pInputText type="text" [formControl]="formToCheck.controls[(controlType == 'list' || controlType == 'listEdit') ? row.validatorRegExpErrorMessage : 'validatorRegExpErrorMessage']" placeholder="Error message" required/>
        </div>
      </div>
  </div>
</div>
