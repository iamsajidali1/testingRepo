# Development Environment values for carche.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

serviceName: carche
namespace: com-att-one
replicaCount: 1
keyVaultName: eastus2-one-nprdkv

image:
  repository: oneeastus2cr2azn0hvf.azurecr.io/carche
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "dev-latest"
  containerPort: 8000
  env:
    - name: SCRIPT_NAME
      value: "/svc/carche"
    - name: CONFIG_FILE
      value: "carche-config-ini@azurekeyvault"

    - name: https_proxy
      value: "http://proxy.conexus.svc.local:3128"
    - name: http_proxy
      value: "http://proxy.conexus.svc.local:3128"
    - name: no_proxy
      value: ".extensions.svc,.vault.azure.net,localhost,127.0.0.1,10.0.16.0/24,.svc.cluster.local,.azurecr.io,.azure.com"

ingress:
  enabled: true
  className: ""
  annotations:
    linkerd.io/inject: enabled
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header l5d-dst-override $service_name.$namespace.svc.cluster.local:$service_port;
  hosts:
    - host: selfservice.dev.att.com
      paths:
        - path: /svc/carche(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: selfservice-dev-tls-certificate
      hosts:
        - selfservice.dev.att.com

volumeMounts:
  - mountPath: /code/_cArche/Templates/
    name: carche-data
  - mountPath: /code/_cArche/Input/
    name: carche-data
  - mountPath: /code/_cArche/Temp/
    name: carche-data
  - mountPath: /code/_cArche/Configs/
    name: carche-data
  - mountPath: /code/config/
    name: carche-config
  - mountPath: /code/carche_project/logs/
    name: carche-config

volumes:
  - name: carche-data
    emptyDir: {}
  - name: carche-config
    emptyDir: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80